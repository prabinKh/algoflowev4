name: Self-Hosted Workflow

on:
  push:
    branches:
      - main

concurrency:
  group: self-hosted-deploy-main
  cancel-in-progress: true

jobs:
  deploy-on-my-server:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show server environment
        run: |
          echo "Running on my own server!"
          uname -a
          df -h
          node --version || echo "Node.js not installed"
          python3 --version || echo "Python3 not installed"
          npm --version || echo "npm not installed"
          # FIX: Show who the runner is running as (helps diagnose permission errors)
          echo "Running as user: $(whoami) (uid=$(id -u))"

      - name: Deploy backend and frontend
        env:
          PORT: 3000
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          chmod +x scripts/deploy-self-hosted.sh
          ./scripts/deploy-self-hosted.sh

      - name: Verify deployment
        # FIX: Give the app a few extra seconds after deploy before hitting health check
        run: |
          sleep 5
          echo "Frontend health:"
          curl -fsS "http://127.0.0.1:3000/api/health"
          echo ""
          echo "Deployment complete. App is running on port 3000."