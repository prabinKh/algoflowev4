name: Self-Hosted Workflow

on:
  push:
    branches:
      - main

concurrency:
  group: self-hosted-deploy-main
  cancel-in-progress: true

jobs:
  deploy-on-my-server:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean up previous processes
        run: |
          # Kill processes using port 3000 and 8001
          fuser -k 3000/tcp || true
          fuser -k 8001/tcp || true
          # Kill by name as backup
          pkill -f "dist/server.mjs" || true
          pkill -f "gunicorn" || true
          # Small wait to ensure ports are released
          sleep 5
        continue-on-error: true

      - name: Deploy backend and frontend
        env:
          PORT: 3000
          NODE_OPTIONS: --max-old-space-size=4096
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
          DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          chmod +x scripts/deploy-self-hosted.sh
          ./scripts/deploy-self-hosted.sh

      - name: Verify deployment
        run: |
          echo "Waiting for services to become ready..."
          # 30 attempts * 10 seconds = 5 minutes timeout
          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:3000/api/health" >/dev/null 2>&1; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
          echo "Health check failed."
          exit 1

      - name: Print logs on failure
        if: failure()
        run: |
          echo "=== App Logs ==="
          tail -n 100 .deploy/logs/app.log || echo "No app logs found"
          echo "=== Backend Logs ==="
          tail -n 100 backend.log || echo "No backend logs found"
          echo "=== Server Logs ==="
          tail -n 100 server.log || echo "No server logs found"
