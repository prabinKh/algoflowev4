name: Self-Hosted Workflow

on:
  push:
    branches:
      - main

concurrency:
  group: self-hosted-deploy-main
  cancel-in-progress: true

jobs:
  deploy-on-my-server:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean up previous processes
        run: |
          pkill -f "dist/server.mjs" || true
          pkill -f "gunicorn" || true
          fuser -k 3000/tcp || true
          fuser -k 8001/tcp || true
        continue-on-error: true

      - name: Deploy backend and frontend
        env:
          PORT: 3000
          NODE_OPTIONS: --max-old-space-size=4096
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
          DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          chmod +x scripts/deploy-self-hosted.sh
          ./scripts/deploy-self-hosted.sh

      - name: Verify deployment
        run: |
          echo "Waiting for services to become ready..."
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:3000/api/health" >/dev/null 2>&1; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Waiting... ($i/60)"
            sleep 5
          done
          echo "Health check failed."
          exit 1

      - name: Print logs on failure
        if: failure()
        run: |
          echo "=== App Logs ==="
          cat .deploy/logs/app.log || echo "No app logs found"
          echo "=== Backend Logs ==="
          cat backend.log || echo "No backend logs found"
          echo "=== Server Logs ==="
          cat server.log || echo "No server logs found"
